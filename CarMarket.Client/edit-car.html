<!DOCTYPE html>
<html>
<head>
    <title>Edit Car</title>

    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <h1>✏️ Edit Car</h1>

    <form id="edit-form">

        <input
            type="text"
            id="brand"
            placeholder="Brand"
            required
        >

        <input
            type="text"
            id="model"
            placeholder="Model"
            required
        >

        <input
            type="number"
            id="price"
            placeholder="Price"
            required
        >

        <button type="submit">
            Update Car
        </button>

    </form>

    <script src="scripts/edit-car.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Add Car</title>

    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

<h1>Add New Car</h1>

<form id="car-form">

    <input
        type="text"
        id="brand"
        placeholder="Brand"
        required
    >

    <input
        type="text"
        id="model"
        placeholder="Model"
        required
    >

    <input
        type="number"
        id="price"
        placeholder="Price"
        required
    >

    <button type="submit">
        Save Car
    </button>

</form>

<script src="scripts/add-car.js"></script>

</body>
</html>
